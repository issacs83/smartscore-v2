<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verovio Score Renderer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #666;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      gap: 12px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #1565c0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #c62828;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 24px;
      text-align: center;
      gap: 8px;
    }

    #notation-container {
      display: none;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0;
    }

    #notation svg {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <span>Loading music engraving engine...</span>
  </div>

  <div id="error"></div>

  <div id="notation-container">
    <div id="notation"></div>
  </div>

  <script>
    // -----------------------------------------------------------------
    // State
    // -----------------------------------------------------------------
    var tk = null;
    var currentPage = 1;
    var totalPages = 1;
    var pendingXml = null;
    var verovioReady = false;

    // -----------------------------------------------------------------
    // UI helpers
    // -----------------------------------------------------------------
    function showLoading(msg) {
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('error').style.display = 'none';
      document.getElementById('notation-container').style.display = 'none';
      if (msg) {
        document.getElementById('loading').querySelector('span').textContent = msg;
      }
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      var errDiv = document.getElementById('error');
      errDiv.style.display = 'flex';
      errDiv.textContent = msg;
      document.getElementById('notation-container').style.display = 'none';
    }

    function showNotation() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById('notation-container').style.display = 'block';
    }

    // -----------------------------------------------------------------
    // Notify Flutter about page state
    // -----------------------------------------------------------------
    function notifyPageChanged() {
      try {
        var msg = JSON.stringify({ type: 'pageChanged', current: currentPage, total: totalPages });
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(msg, '*');
        }
      } catch (e) {
        // ignore
      }
    }

    // -----------------------------------------------------------------
    // Render helpers
    // -----------------------------------------------------------------
    function getVerovioOptions() {
      var w = window.innerWidth || 800;
      // Verovio units are in 100ths of mm; scale maps px to mm
      // scale: 40 means 40% of normal size; pageWidth in verovio units
      var scale = 40;
      var mmPerPx = 0.2645833333;
      var pageWidthMm = w * mmPerPx;
      var pageWidthVrv = Math.round(pageWidthMm * 100 / scale * 100);
      return {
        scale: scale,
        pageWidth: pageWidthVrv,
        adjustPageHeight: true,
        header: 'none',
        footer: 'none',
        breaks: 'auto',
        svgViewBox: true,
      };
    }

    function renderPage(page) {
      if (!tk) return;
      try {
        var svg = tk.renderToSVG(page);
        document.getElementById('notation').innerHTML = svg;
        document.getElementById('notation-container').scrollTop = 0;
        currentPage = page;
        showNotation();
        notifyPageChanged();
      } catch (e) {
        showError('Render error: ' + e.message);
      }
    }

    function loadScore(musicXml) {
      if (!tk) {
        pendingXml = musicXml;
        return;
      }
      try {
        showLoading('Engraving score...');
        tk.setOptions(getVerovioOptions());
        var ok = tk.loadData(musicXml);
        if (!ok) {
          showError('Verovio could not parse the MusicXML data.');
          return;
        }
        totalPages = tk.getPageCount();
        currentPage = 1;
        renderPage(1);
      } catch (e) {
        showError('Score load error: ' + e.message);
      }
    }

    // -----------------------------------------------------------------
    // Page navigation API (called from Flutter via postMessage)
    // -----------------------------------------------------------------
    function nextPage() {
      if (currentPage < totalPages) {
        renderPage(currentPage + 1);
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        renderPage(currentPage - 1);
      }
    }

    // -----------------------------------------------------------------
    // postMessage bridge (Flutter -> iframe)
    // -----------------------------------------------------------------
    window.addEventListener('message', function(event) {
      try {
        var data = event.data;
        if (typeof data === 'string') {
          data = JSON.parse(data);
        }
        if (!data || !data.type) return;

        switch (data.type) {
          case 'loadScore':
            loadScore(data.xml);
            break;
          case 'nextPage':
            nextPage();
            break;
          case 'prevPage':
            prevPage();
            break;
        }
      } catch (e) {
        // ignore malformed messages
      }
    });

    // -----------------------------------------------------------------
    // Load Verovio from CDN
    // -----------------------------------------------------------------
    showLoading('Loading music engraving engine...');

    var script = document.createElement('script');
    script.src = 'https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js';
    script.onload = function() {
      verovio.module.onRuntimeInitialized = function() {
        try {
          tk = new verovio.toolkit();
          verovioReady = true;
          // If Flutter already sent the score before Verovio was ready
          if (pendingXml) {
            var xml = pendingXml;
            pendingXml = null;
            loadScore(xml);
          } else {
            showLoading('Ready. Waiting for score...');
          }
        } catch (e) {
          showError('Failed to initialize Verovio: ' + e.message);
        }
      };
    };
    script.onerror = function() {
      showError(
        'Failed to load Verovio from CDN.\n' +
        'Please check your internet connection.\n' +
        'URL: https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js'
      );
    };
    document.head.appendChild(script);
  </script>
</body>
</html>
