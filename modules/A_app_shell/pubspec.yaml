name: smartscore
description: "Smart music score viewer with device integration"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.0.0

  # Navigation
  go_router: ^10.0.0

  # Internationalization
  intl: ^0.19.0

  # UI components
  material_design_icons_flutter: ^7.0.0
  google_fonts: ^5.0.0

  # File handling
  file_picker: ^5.0.0
  image_picker: ^0.8.0

  # Storage
  sqflite: ^2.2.0
  path: ^1.8.0
  path_provider: ^2.0.0

  # Parsing
  xml: ^6.0.0

  # Utilities
  uuid: ^3.0.0
  crypto: ^3.0.0

  # Module dependencies (local)
  # These would reference the other modules in a real setup
  # For now, we assume they're available as pub packages or local paths

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

  # Testing
  mockito: ^5.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/
    - assets/fonts/
    - assets/images/

  # Fonts
  fonts:
    - family: Courier
      fonts:
        - asset: assets/fonts/courier.ttf

# Build configuration
build:
  android:
    # App signing
    release:
      signingConfig: signingConfigs.release

  ios:
    # Code signing
    certificateId: "iPhone Developer"

# Feature flags for build variants
dart_define:
  FLAVOR: dev
  DEBUG_MODE: true
  DEMO_MODE: false
